<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sayfa Bulunamadı | MirAkıl</title>
    <meta name="description" content="Aradığınız sayfa bulunamadı. MirAkıl ana sayfasına dönerek devam edebilirsiniz.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2E7C01;
            --primary-light: #45BA01;
            --primary-dark: #1a5a00;
            --teal: #709CA5;
            --teal-dark: #253437;
            --dark: #1a1a1a;
            --text: #333;
            --text-light: #666;
            --bg: #fff;
            --bg-light: #f7f8f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            color: var(--text);
            line-height: 1.7;
            background: linear-gradient(135deg, var(--teal-dark) 0%, #1a3a20 50%, var(--primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1, h2, h3 { font-family: 'Archivo', sans-serif; line-height: 1.3; }
        a { text-decoration: none; color: inherit; }

        .error-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .error-code {
            font-family: 'Archivo', sans-serif;
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 32px;
            line-height: 1.8;
        }
        .error-icon {
            font-size: 3rem;
            color: var(--teal);
            margin-bottom: 20px;
        }
        .error-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            border-radius: 10px;
            font-family: 'Archivo', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46,124,1,0.3);
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46,124,1,0.4);
        }
        .btn-support {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 10px;
            font-family: 'Archivo', sans-serif;
            font-weight: 600;
            font-size: 0.88rem;
            transition: all 0.3s ease;
        }
        .btn-support:hover {
            background: var(--primary);
            color: #fff;
        }
        .quick-links {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }
        .quick-links h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        .quick-links-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .quick-link {
            padding: 6px 16px;
            background: var(--bg-light);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text);
            transition: all 0.2s ease;
        }
        .quick-link:hover {
            background: var(--primary);
            color: #fff;
        }

        @media (max-width: 600px) {
            .error-container { padding: 40px 24px; }
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon"><i class="fas fa-map-signs"></i></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Sayfa Bulunamadı</h1>
        <p class="error-message">
            Aradığınız sayfa taşınmış, silinmiş veya hiç var olmamış olabilir.<br>
            Aşağıdaki bağlantıları kullanarak devam edebilirsiniz.
        </p>
        <div class="error-links">
            <a href="index.html" class="btn-home"><i class="fas fa-home"></i> Ana Sayfaya Dön</a>
            <a href="destek.html" class="btn-support"><i class="fas fa-headset"></i> Destek Talebi Oluştur</a>
        </div>
        <div class="quick-links">
            <h3>Popüler Sayfalar</h3>
            <div class="quick-links-grid">
                <a href="koha.html" class="quick-link">Koha</a>
                <a href="dspace.html" class="quick-link">DSpace</a>
                <a href="vufind.html" class="quick-link">VuFind</a>
                <a href="omeka.html" class="quick-link">Omeka</a>
                <a href="moodle.html" class="quick-link">Moodle</a>
                <a href="ojs.html" class="quick-link">OJS</a>
                <a href="indico.html" class="quick-link">Indico</a>
                <a href="collectiveaccess.html" class="quick-link">CollectiveAccess</a>
            </div>
        </div>
    </div>
</body>
</html>
